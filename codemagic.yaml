workflows:
  ios-testflight:
    name: DishList iOS - TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: dishlist-app-store-connect
    environment:
      node: 22
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.giovanniaccinelli.dishlist
      vars:
        BUNDLE_ID: com.giovanniaccinelli.dishlist
        NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyBAos19VBROVcYRMu6I7Wg4tW2LnJbstnw
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dishlist-7f0ae.firebaseapp.com
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: dishlist-7f0ae
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dishlist-7f0ae.firebasestorage.app
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "938623496427"
        NEXT_PUBLIC_FIREBASE_APP_ID: "1:938623496427:web:bdddc75b0a747ab4e50eae"
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build Next app
        script: |
          npm run build
      - name: Sync Capacitor iOS project
        script: |
          npx cap sync ios
      - name: Set iOS build number
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Set up code signing
        script: |
          set -euo pipefail
          xcode-project use-profiles
          echo "----- INSTALLED PROVISIONING PROFILE ENTITLEMENTS -----"
          MATCHED_APPLE_SIGN_IN_PROFILE=0
          FOUND_PROFILE=0
          for profile_dir in \
            "$HOME/Library/MobileDevice/Provisioning Profiles" \
            "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
            [ -d "$profile_dir" ] || continue
            for profile in "$profile_dir"/*.mobileprovision "$profile_dir"/*.provisionprofile; do
              [ -e "$profile" ] || continue
              FOUND_PROFILE=1
              echo "$profile"
              security cms -D -i "$profile" > /tmp/profile.plist
              /usr/libexec/PlistBuddy -c "Print :Entitlements" /tmp/profile.plist || true
              if /usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.applesignin" /tmp/profile.plist >/dev/null 2>&1; then
                MATCHED_APPLE_SIGN_IN_PROFILE=1
              fi
            done
          done
          if [ "$FOUND_PROFILE" != "1" ]; then
            echo "ERROR: Codemagic did not install any provisioning profile."
            echo "Check Codemagic iOS code signing settings/integration for bundle $BUNDLE_ID."
            exit 1
          fi
          if [ "$MATCHED_APPLE_SIGN_IN_PROFILE" != "1" ]; then
            echo "ERROR: Installed provisioning profile still does not include com.apple.developer.applesignin."
            echo "Regenerate the App Store provisioning profile after enabling Sign in with Apple on the App ID."
            exit 1
          fi
      - name: Build signed IPA
        script: |
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME" || {
            echo "----- XCODEBUILD LOGS -----"
            find /tmp/xcodebuild_logs -maxdepth 1 -type f -print -exec cat {} \;
            exit 1
          }
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
