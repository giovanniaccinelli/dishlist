workflows:
  ios-testflight:
    name: DishList iOS - TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: dishlist-app-store-connect
    environment:
      node: 22
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.giovanniaccinelli.dishlist
      vars:
        BUNDLE_ID: com.giovanniaccinelli.dishlist
        NEXT_PUBLIC_FIREBASE_API_KEY: AIzaSyBAos19VBROVcYRMu6I7Wg4tW2LnJbstnw
        NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: dishlist-7f0ae.firebaseapp.com
        NEXT_PUBLIC_FIREBASE_PROJECT_ID: dishlist-7f0ae
        NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: dishlist-7f0ae.firebasestorage.app
        NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: "938623496427"
        NEXT_PUBLIC_FIREBASE_APP_ID: "1:938623496427:web:bdddc75b0a747ab4e50eae"
        XCODE_PROJECT: ios/App/App.xcodeproj
        XCODE_SCHEME: App
    scripts:
      - name: Install dependencies
        script: |
          npm ci
      - name: Build Next app
        script: |
          npm run build
      - name: Sync Capacitor iOS project
        script: |
          npx cap sync ios
      - name: Set iOS build number
        script: |
          cd ios/App
          agvtool new-version -all "$BUILD_NUMBER"
      - name: Set up code signing
        script: |
          set -euo pipefail
          xcode-project use-profiles
          echo "----- INSTALLED PROVISIONING PROFILE ENTITLEMENTS -----"
          MATCHED_APPLE_SIGN_IN_PROFILE=0
          FOUND_PROFILE=0
          for profile_dir in \
            "$HOME/Library/MobileDevice/Provisioning Profiles" \
            "$HOME/Library/Developer/Xcode/UserData/Provisioning Profiles"; do
            [ -d "$profile_dir" ] || continue
            for profile in "$profile_dir"/*.mobileprovision "$profile_dir"/*.provisionprofile; do
              [ -e "$profile" ] || continue
              FOUND_PROFILE=1
              echo "$profile"
              security cms -D -i "$profile" > /tmp/profile.plist
              /usr/libexec/PlistBuddy -c "Print :Entitlements" /tmp/profile.plist || true
              if /usr/libexec/PlistBuddy -c "Print :Entitlements:com.apple.developer.applesignin" /tmp/profile.plist >/dev/null 2>&1; then
                MATCHED_APPLE_SIGN_IN_PROFILE=1
              fi
            done
          done
          if [ "$FOUND_PROFILE" != "1" ]; then
            echo "ERROR: Codemagic did not install any provisioning profile."
            echo "Check Codemagic iOS code signing settings/integration for bundle $BUNDLE_ID."
            exit 1
          fi
          if [ "$MATCHED_APPLE_SIGN_IN_PROFILE" != "1" ]; then
            echo "ERROR: Installed provisioning profile still does not include com.apple.developer.applesignin."
            echo "Regenerate the App Store provisioning profile after enabling Sign in with Apple on the App ID."
            exit 1
          fi
      - name: Normalize App Store Connect private key
        script: |
          python3 - <<'PY'
          import os, re, sys

          raw = os.environ.get("APP_STORE_CONNECT_PRIVATE_KEY", "")
          if not raw.strip():
            print("ERROR: APP_STORE_CONNECT_PRIVATE_KEY is empty or missing.")
            sys.exit(1)

          normalized = raw.strip()
          normalized = normalized.replace("\\r\\n", "\n").replace("\\n", "\n")
          normalized = normalized.replace("\r\n", "\n").replace("\r", "\n")
          normalized = re.sub(r"\s+", " ", normalized).strip()
          normalized = normalized.replace("-----BEGIN PRIVATE KEY----- ", "-----BEGIN PRIVATE KEY-----\n")
          normalized = normalized.replace(" -----END PRIVATE KEY-----", "\n-----END PRIVATE KEY-----")
          normalized = normalized.replace("-----BEGIN PRIVATE KEY-----", "-----BEGIN PRIVATE KEY-----\n", 1)
          normalized = normalized[::-1].replace("-----YEK ETAVIRP DNE-----"[::-1], "\n-----END PRIVATE KEY-----"[::-1], 1)[::-1]

          lines = [line.strip() for line in normalized.split("\n") if line.strip()]
          if len(lines) < 3 and "-----BEGIN PRIVATE KEY-----" in normalized and "-----END PRIVATE KEY-----" in normalized:
            begin = "-----BEGIN PRIVATE KEY-----"
            end = "-----END PRIVATE KEY-----"
            start = normalized.index(begin) + len(begin)
            finish = normalized.index(end)
            body = normalized[start:finish]
            body = re.sub(r"\s+", "", body)
            chunks = [body[i:i+64] for i in range(0, len(body), 64) if body[i:i+64]]
            lines = [begin, *chunks, end]
          if len(lines) < 3:
            print("ERROR: APP_STORE_CONNECT_PRIVATE_KEY still does not contain a valid PEM structure after normalization.")
            sys.exit(1)

          if not lines[0].startswith("-----BEGIN ") or "PRIVATE KEY-----" not in lines[0]:
            print("ERROR: APP_STORE_CONNECT_PRIVATE_KEY is missing a valid BEGIN PRIVATE KEY header.")
            sys.exit(1)

          if not lines[-1].startswith("-----END ") or "PRIVATE KEY-----" not in lines[-1]:
            print("ERROR: APP_STORE_CONNECT_PRIVATE_KEY is missing a valid END PRIVATE KEY footer.")
            sys.exit(1)

          pem = "\n".join([lines[0], *lines[1:-1], lines[-1]]) + "\n"
          cm_env = os.environ.get("CM_ENV")
          if not cm_env:
            print("ERROR: CM_ENV is not available.")
            sys.exit(1)

          with open(cm_env, "a", encoding="utf-8") as handle:
            handle.write("APP_STORE_CONNECT_PRIVATE_KEY_PEM<<__CM_PEM__\n")
            handle.write(pem)
            handle.write("__CM_PEM__\n")

          print("Normalized App Store Connect private key for publishing.")
          PY
      - name: Build signed IPA
        script: |
          xcode-project build-ipa --project "$XCODE_PROJECT" --scheme "$XCODE_SCHEME" || {
            echo "----- XCODEBUILD LOGS -----"
            find /tmp/xcodebuild_logs -maxdepth 1 -type f -print -exec cat {} \;
            exit 1
          }
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY_PEM
        key_id: VVLCZK238Q
        issuer_id: 75bff3d7-7609-4a92-9b66-212cfb0d4861
        submit_to_testflight: true
